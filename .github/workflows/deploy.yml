name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build React App for GitHub Pages
        run: |
          # INSTRUCTIONS: 
          # 1. Replace '/Vibration-Guitar-Academy' with your actual GitHub repository name!
          # 2. Add VITE_API_BASE matching your deployed Vercel server domain!
          export VITE_BASE_PATH="/Vibration-Guitar-Academy/"
          export VITE_API_BASE="https://your-app-name.vercel.app"
          npm run build
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
